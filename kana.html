<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>היראגאנה וקטקאנה — טבלאות ומשחק | יפנית N5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Heebo:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script>try{var n5t=JSON.parse(localStorage.getItem('n5.theme'));if(n5t==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}</script>
<link rel="stylesheet" href="assets/site.css">
<script src="assets/site.js" defer></script>
<style>
  :root{
    --paper:#f4eee2; --card:#fffdf8; --ink:#231f19; --muted:#6f6555;
    --accent:#b23a1e; --accent-soft:#f3ddd2; --gold:#9a7b2e; --line:#e6dcc7;
    --ok:#3f7d6e; --ok-soft:#e3f0eb; --no:#b23a1e; --no-soft:#f6e1da;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Frank Ruhl Libre", Georgia, serif; font-size:18px; line-height:1.8;
    background-image:radial-gradient(circle at 1px 1px, rgba(120,100,70,.06) 1px, transparent 0);
    background-size:22px 22px; min-height:100vh;
  }
  .wrap{max-width:820px; margin:0 auto; padding:0 20px 110px;}
  .jp{font-family:"Noto Sans JP", system-ui, sans-serif; direction:ltr; unicode-bidi:isolate; font-weight:500;}

  header.masthead{text-align:center; padding:46px 20px 26px; border-bottom:3px double var(--line); margin-bottom:22px;}
  header.masthead .kicker{font-family:"Heebo",sans-serif; letter-spacing:.06em; color:var(--accent); font-size:13px; font-weight:800;}
  header.masthead h1{font-family:"Heebo",sans-serif; font-weight:800; font-size:clamp(26px,5.5vw,38px); margin:.2em 0 .15em;}
  header.masthead .sub{color:var(--muted); margin:0; font-size:16px;}

  .controls{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:20px;}
  .seg{display:inline-flex; background:var(--card); border:1.5px solid var(--line); border-radius:999px; overflow:hidden;}
  .seg button{
    font-family:"Heebo",sans-serif; font-weight:700; font-size:14.5px; border:none; background:transparent;
    color:var(--muted); padding:9px 20px; cursor:pointer; transition:.15s;
  }
  .seg button.on{background:var(--accent); color:#fff;}
  .ctrl-btn{
    font-family:"Heebo",sans-serif; font-weight:700; font-size:14px; border:1.5px solid var(--line);
    background:var(--card); color:var(--ink); border-radius:999px; padding:8px 16px; cursor:pointer; transition:.15s;
  }
  .ctrl-btn.on{background:var(--gold); border-color:var(--gold); color:#fff;}

  /* charts */
  .kana-block{margin:24px 0;}
  .kana-block h2{font-family:"Heebo",sans-serif; font-weight:800; font-size:20px; margin:0 0 12px; color:var(--accent);}
  .kana-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; direction:ltr;}
  @media(max-width:520px){.kana-grid{gap:5px;}}
  .kana-cell{
    background:var(--card); border:1.5px solid var(--line); border-radius:12px;
    text-align:center; padding:10px 4px 8px; cursor:pointer; transition:.15s; user-select:none;
  }
  .kana-cell:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 10px rgba(80,60,30,.12);}
  .kana-cell.playing{background:var(--accent-soft); border-color:var(--accent);}
  .kana-cell .k{font-family:"Noto Sans JP",sans-serif; font-size:30px; font-weight:700; line-height:1.2; display:block;}
  .kana-cell .ro{font-family:"Heebo",sans-serif; font-size:12.5px; color:var(--muted); display:block; transition:.15s;}
  .kana-cell.ghost{visibility:hidden;}
  html.hide-romaji .kana-cell .ro{opacity:0;}
  html.hide-romaji .kana-cell:hover .ro{opacity:1;}

  /* game */
  .game-box{
    max-width:560px; margin:0 auto; background:var(--card); border:1.5px solid var(--line);
    border-radius:20px; padding:28px 24px; text-align:center; box-shadow:0 10px 28px rgba(80,60,30,.1);
  }
  .game-box .gq{font-family:"Noto Sans JP",sans-serif; font-size:76px; font-weight:700; line-height:1.2; margin:6px 0 4px; direction:ltr;}
  .game-box .gq.ro{font-family:"Heebo",sans-serif; font-size:46px;}
  .g-meta{display:flex; justify-content:space-between; font-family:"Heebo",sans-serif; font-size:13px; color:var(--muted); margin-bottom:8px;}
  .g-bar{height:6px; background:#eadfc9; border-radius:99px; overflow:hidden; margin-bottom:6px;}
  html[data-theme="dark"] .g-bar{background:#332c22;}
  .g-bar span{display:block; height:100%; background:var(--accent); transition:width .3s;}
  .g-opts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px;}
  .g-opts button{
    font-family:"Heebo",sans-serif; font-weight:800; font-size:22px;
    background:var(--paper); border:1.5px solid var(--line); border-radius:12px;
    padding:14px 8px; cursor:pointer; transition:.15s; color:var(--ink);
  }
  .g-opts button.jp-opt{font-family:"Noto Sans JP",sans-serif; font-size:28px;}
  .g-opts button:hover:not(:disabled){border-color:var(--accent);}
  .g-opts button.correct{background:var(--ok-soft); border-color:var(--ok); color:var(--ok);}
  .g-opts button.wrong{background:var(--no-soft); border-color:var(--no); color:var(--no);}
  .g-streak{font-family:"Heebo",sans-serif; font-weight:800; color:var(--gold); min-height:24px; margin-top:10px; font-size:15px;}
  .g-start,.g-result button{
    font-family:"Heebo",sans-serif; font-weight:800; font-size:17px; background:var(--accent); color:#fff;
    border:none; border-radius:12px; padding:14px 34px; cursor:pointer; transition:.15s; margin-top:14px;
  }
  .g-start:hover,.g-result button:hover{transform:translateY(-2px);}
  .g-result .big{font-family:"Heebo",sans-serif; font-weight:800; font-size:48px; color:var(--accent);}
  .g-best{font-family:"Heebo",sans-serif; font-size:14px; color:var(--gold); font-weight:700; margin-top:8px;}
  .hidden{display:none !important;}

  .week-nav{
    display:inline-flex; align-items:center; gap:6px;
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:999;
    padding:5px 10px; background:rgba(255,253,248,.96); border:1px solid var(--line);
    border-radius:999px; box-shadow:0 4px 16px rgba(80,60,30,.15); backdrop-filter:blur(8px);
  }
  .week-nav a{
    font-family:"Heebo",sans-serif; font-weight:700; font-size:12px;
    padding:5px 11px; border-radius:999px; text-decoration:none; transition:.15s; white-space:nowrap;
  }
  .nav-home{background:var(--ok-soft); color:#1f4d43; border:1px solid #bcd9d0;}
  .nav-next{background:var(--accent); color:#fff;}
  .wrap>*{animation:rise .5s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1;}}
</style>
</head>
<body data-page="kana">
<div class="wrap">

<header class="masthead">
  <div class="kicker">🈁 יסודות הכתב · <span class="jp" dir="ltr">かな</span></div>
  <h1>היראגאנה וקטקאנה</h1>
  <p class="sub">לחץ על כל אות כדי לשמוע אותה · הסתר את התעתיק כדי לבחון את עצמך · שחק במשחק הזיהוי</p>
</header>

<div class="controls">
  <div class="seg" id="seg-view">
    <button data-v="hira" class="on">היראגאנה</button>
    <button data-v="kata">קטקאנה</button>
    <button data-v="game">🎮 משחק זיהוי</button>
  </div>
  <button class="ctrl-btn" id="btn-romaji">הסתר תעתיק</button>
</div>

<div id="chart-area"></div>

<div id="game-area" class="hidden">
  <div class="controls">
    <div class="seg" id="seg-gscript">
      <button data-v="hira" class="on">היראגאנה</button>
      <button data-v="kata">קטקאנה</button>
      <button data-v="both">שניהם</button>
    </div>
    <div class="seg" id="seg-gmode">
      <button data-v="k2r" class="on">קאנה ← תעתיק</button>
      <button data-v="r2k">תעתיק ← קאנה</button>
    </div>
  </div>
  <div class="game-box" id="game-box"></div>
</div>

</div>

<div class="week-nav">
  <a href="index.html" class="nav-home">&#127968; דף הבית</a>
  <a href="flashcards.html" class="nav-next">כרטיסיות ←</a>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  'use strict';
  const N5 = window.N5;
  const $ = s => document.querySelector(s);

  /* ── נתוני קאנה: שורות של [היראגאנה, תעתיק] ── */
  const GOJUON = [
    [['あ','a'],['い','i'],['う','u'],['え','e'],['お','o']],
    [['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko']],
    [['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so']],
    [['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to']],
    [['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no']],
    [['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho']],
    [['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo']],
    [['や','ya'],null,['ゆ','yu'],null,['よ','yo']],
    [['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro']],
    [['わ','wa'],null,null,null,['を','wo']],
    [['ん','n'],null,null,null,null]
  ];
  const DAKUTEN = [
    [['が','ga'],['ぎ','gi'],['ぐ','gu'],['げ','ge'],['ご','go']],
    [['ざ','za'],['じ','ji'],['ず','zu'],['ぜ','ze'],['ぞ','zo']],
    [['だ','da'],['ぢ','ji'],['づ','zu'],['で','de'],['ど','do']],
    [['ば','ba'],['び','bi'],['ぶ','bu'],['べ','be'],['ぼ','bo']],
    [['ぱ','pa'],['ぴ','pi'],['ぷ','pu'],['ぺ','pe'],['ぽ','po']]
  ];
  const toKata = h => h.replace(/[぀-ゟ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));

  /* ── טבלאות ── */
  const chartArea = $('#chart-area');
  function buildChart(script){
    chartArea.innerHTML = '';
    const blocks = [['גוג\'ואון — הטבלה הבסיסית', GOJUON], ['דאקוטן והנדאקוטן — צלילים קוליים', DAKUTEN]];
    blocks.forEach(([title, rows]) => {
      const b = document.createElement('div');
      b.className = 'kana-block';
      b.innerHTML = '<h2>' + title + '</h2>';
      const g = document.createElement('div');
      g.className = 'kana-grid';
      rows.forEach(row => row.forEach(cell => {
        const d = document.createElement('div');
        if (!cell) { d.className = 'kana-cell ghost'; g.appendChild(d); return; }
        const ch = script === 'kata' ? toKata(cell[0]) : cell[0];
        d.className = 'kana-cell';
        d.innerHTML = '<span class="k">' + ch + '</span><span class="ro">' + cell[1] + '</span>';
        d.addEventListener('click', () => {
          N5.speak(ch);
          d.classList.add('playing');
          setTimeout(() => d.classList.remove('playing'), 600);
        });
        g.appendChild(d);
      }));
      b.appendChild(g);
      chartArea.appendChild(b);
    });
  }

  /* ── תצוגות ── */
  let view = 'hira';
  document.querySelectorAll('#seg-view button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#seg-view button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      view = b.dataset.v;
      const game = view === 'game';
      $('#game-area').classList.toggle('hidden', !game);
      chartArea.classList.toggle('hidden', game);
      $('#btn-romaji').classList.toggle('hidden', game);
      if (!game) buildChart(view);
      else renderGameStart();
    });
  });

  const romajiBtn = $('#btn-romaji');
  romajiBtn.addEventListener('click', () => {
    const hidden = document.documentElement.classList.toggle('hide-romaji');
    romajiBtn.classList.toggle('on', hidden);
    romajiBtn.textContent = hidden ? 'הצג תעתיק' : 'הסתר תעתיק';
    if (hidden) N5.toast('מצב מבחן עצמי — רחף מעל אות כדי להציץ בתעתיק');
  });

  /* ── משחק ── */
  const G = { script: 'hira', mode: 'k2r', pool: [], q: 0, total: 15, score: 0, streak: 0, playing: false };
  const gbox = $('#game-box');
  const bestKey = () => G.script + '-' + G.mode;

  function buildPool(){
    const flat = [];
    [GOJUON, DAKUTEN].forEach(rows => rows.forEach(r => r.forEach(c => { if (c) flat.push(c); })));
    G.pool = [];
    flat.forEach(c => {
      if (G.script === 'hira' || G.script === 'both') G.pool.push([c[0], c[1]]);
      if (G.script === 'kata' || G.script === 'both') G.pool.push([toKata(c[0]), c[1]]);
    });
  }
  function segG(id, key){
    document.querySelectorAll('#' + id + ' button').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#' + id + ' button').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        G[key] = b.dataset.v;
        renderGameStart();
      });
    });
  }
  segG('seg-gscript', 'script');
  segG('seg-gmode', 'mode');

  function renderGameStart(){
    G.playing = false;
    const best = N5.store.get('kanaBest', {})[bestKey()];
    gbox.innerHTML =
      '<p style="font-family:Heebo;font-weight:700;font-size:17px;margin:0">15 שאלות · כמה תקלע?</p>' +
      (best != null ? '<div class="g-best">🏆 השיא שלך: ' + best + ' / 15</div>' : '') +
      '<button class="g-start">התחל משחק ▶</button>';
    gbox.querySelector('.g-start').addEventListener('click', startGame);
  }
  function startGame(){
    buildPool();
    G.q = 0; G.score = 0; G.streak = 0; G.playing = true;
    nextQ();
  }
  function nextQ(){
    if (G.q >= G.total) return endGame();
    const answer = G.pool[Math.floor(Math.random() * G.pool.length)];
    const wrongs = [];
    const used = { [answer[1]]: 1 };
    while (wrongs.length < 3) {
      const c = G.pool[Math.floor(Math.random() * G.pool.length)];
      if (used[c[1]]) continue;
      used[c[1]] = 1; wrongs.push(c);
    }
    const opts = [answer].concat(wrongs).sort(() => Math.random() - .5);
    const k2r = G.mode === 'k2r';
    gbox.innerHTML =
      '<div class="g-meta"><span>שאלה ' + (G.q + 1) + ' / ' + G.total + '</span><span>ניקוד: ' + G.score + '</span></div>' +
      '<div class="g-bar"><span style="width:' + (G.q / G.total * 100) + '%"></span></div>' +
      '<div class="gq' + (k2r ? '' : ' ro') + '">' + (k2r ? answer[0] : answer[1]) + '</div>' +
      '<div class="g-opts">' + opts.map(o =>
        '<button class="' + (k2r ? '' : 'jp-opt') + '" data-ro="' + o[1] + '" data-k="' + o[0] + '">' + (k2r ? o[1] : o[0]) + '</button>'
      ).join('') + '</div>' +
      '<div class="g-streak"></div>';
    if (k2r) N5.speak(answer[0]);
    const streakEl = gbox.querySelector('.g-streak');
    gbox.querySelectorAll('.g-opts button').forEach(b => {
      b.addEventListener('click', () => {
        if (!G.playing) return;
        gbox.querySelectorAll('.g-opts button').forEach(x => x.disabled = true);
        const right = b.dataset.ro === answer[1] && (k2r || b.dataset.k === answer[0]);
        if (right) {
          b.classList.add('correct');
          G.score++; G.streak++;
          if (G.streak >= 3) streakEl.textContent = '🔥 רצף של ' + G.streak + '!';
        } else {
          b.classList.add('wrong');
          G.streak = 0;
          gbox.querySelectorAll('.g-opts button').forEach(x => {
            if (x.dataset.ro === answer[1] && (k2r || x.dataset.k === answer[0])) x.classList.add('correct');
          });
        }
        if (!k2r) N5.speak(answer[0]);
        setTimeout(() => { G.q++; nextQ(); }, right ? 650 : 1400);
      });
    });
  }
  function endGame(){
    G.playing = false;
    const bests = N5.store.get('kanaBest', {});
    const prev = bests[bestKey()];
    const isRecord = prev == null || G.score > prev;
    if (isRecord) { bests[bestKey()] = G.score; N5.store.set('kanaBest', bests); }
    if (G.score === G.total || isRecord && prev != null) N5.confetti(45);
    gbox.innerHTML =
      '<div class="g-result">' +
        '<div class="big">' + G.score + ' / ' + G.total + '</div>' +
        (isRecord ? '<div class="g-best">🏆 שיא אישי חדש!</div>' : (prev != null ? '<div class="g-best">השיא שלך: ' + prev + '</div>' : '')) +
        '<p style="font-family:Heebo;margin:8px 0 0">' + (G.score === G.total ? 'מושלם! 完璧！' : G.score >= G.total * .7 ? 'יפה מאוד! עוד קצת ותגיע ל-15.' : 'תרגול עושה שלמות — עוד סיבוב?') + '</p>' +
        '<button>עוד סיבוב 🔁</button>' +
      '</div>';
    gbox.querySelector('button').addEventListener('click', startGame);
  }

  buildChart('hira');
});
</script>
</body>
</html>
