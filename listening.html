<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="assets/icon-180.png">

<title>תרגול האזנה — שמע ובחר | יפנית N5</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script>try{var n5t=JSON.parse(localStorage.getItem('n5.theme'));if(n5t==='dark'||(n5t==null&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark')}catch(e){}</script>
<link rel="stylesheet" href="assets/site.css">
<script src="assets/deck-data.js"></script>
<script src="assets/site.js" defer></script>
<script src="assets/word-art.js" defer></script>
<script src="assets/game.js" defer></script>

<style>
  :root{
    --paper:#f4eee2; --card:#fffdf8; --ink:#231f19; --muted:#6f6555;
    --accent:#b23a1e; --accent-soft:#f3ddd2; --gold:#9a7b2e; --line:#e6dcc7;
    --ok:#3f7d6e; --ok-soft:#e3f0eb; --no:#b23a1e; --no-soft:#f6e1da;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Frank Ruhl Libre", Georgia, serif; font-size:18px; line-height:1.8;
    background-image:radial-gradient(circle at 1px 1px, rgba(120,100,70,.06) 1px, transparent 0);
    background-size:22px 22px; min-height:100vh;
  }
  .wrap{max-width:820px; margin:0 auto; padding:0 20px 110px;}
  .jp{font-family:"Noto Sans JP", system-ui, sans-serif; direction:ltr; unicode-bidi:isolate; font-weight:500;}

  header.masthead{text-align:center; padding:46px 20px 26px; border-bottom:3px double var(--line); margin-bottom:22px;}
  header.masthead .kicker{font-family:"Heebo",sans-serif; letter-spacing:.06em; color:var(--accent); font-size:13px; font-weight:800;}
  header.masthead h1{font-family:"Heebo",sans-serif; font-weight:800; font-size:clamp(26px,5.5vw,38px); margin:.2em 0 .15em;}
  header.masthead .sub{color:var(--muted); margin:0; font-size:16px;}

  .controls{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:20px;}
  .seg{display:inline-flex; background:var(--card); border:1.5px solid var(--line); border-radius:999px; overflow:hidden;}
  .seg button{
    font-family:"Heebo",sans-serif; font-weight:700; font-size:14.5px; border:none; background:transparent;
    color:var(--muted); padding:9px 20px; cursor:pointer; transition:.15s;
  }
  .seg button.on{background:var(--accent); color:#fff;}
  .week-sel{
    font-family:"Heebo",sans-serif; font-weight:700; font-size:14px;
    background:var(--card); color:var(--ink); border:1.5px solid var(--line);
    border-radius:999px; padding:8px 16px; cursor:pointer;
  }

  .game-box{
    max-width:560px; margin:0 auto; background:var(--card); border:1.5px solid var(--line);
    border-radius:20px; padding:28px 24px; text-align:center; box-shadow:0 10px 28px rgba(80,60,30,.1);
  }
  .g-meta{display:flex; justify-content:space-between; font-family:"Heebo",sans-serif; font-size:13px; color:var(--muted); margin-bottom:8px;}
  .g-bar{height:6px; background:#eadfc9; border-radius:99px; overflow:hidden; margin-bottom:6px;}
  html[data-theme="dark"] .g-bar{background:#332c22;}
  .g-bar span{display:block; height:100%; background:var(--accent); transition:width .3s;}

  .g-play{
    width:110px; height:110px; border-radius:50%; border:none; cursor:pointer;
    background:linear-gradient(160deg,var(--accent),#8e2f17); color:#fff; font-size:44px;
    box-shadow:0 8px 22px rgba(150,60,30,.35); transition:.15s; margin:18px 0 4px;
  }
  .g-play:hover{transform:scale(1.07);}
  .g-play.playing{animation:n5pulse 1.2s ease-in-out infinite;}
  .g-play-lbl{font-family:"Heebo",sans-serif; font-size:13px; color:var(--muted); margin-bottom:8px;}

  .g-opts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px;}
  .g-opts button{
    font-family:"Heebo",sans-serif; font-weight:800; font-size:19px;
    background:var(--paper); border:1.5px solid var(--line); border-radius:12px;
    padding:14px 8px; cursor:pointer; transition:.15s; color:var(--ink); min-height:60px;
  }
  .g-opts button.jp-opt{font-family:"Noto Sans JP",sans-serif; font-size:24px;}
  .g-opts button:hover:not(:disabled){border-color:var(--accent);}
  .g-opts button.correct{background:var(--ok-soft); border-color:var(--ok); color:var(--ok);}
  .g-opts button.wrong{background:var(--no-soft); border-color:var(--no); color:var(--no);}
  .g-streak{font-family:"Heebo",sans-serif; font-weight:800; color:var(--gold); min-height:24px; margin-top:10px; font-size:15px;}
  .g-start,.g-result button{
    font-family:"Heebo",sans-serif; font-weight:800; font-size:17px; background:var(--accent); color:#fff;
    border:none; border-radius:12px; padding:14px 34px; cursor:pointer; transition:.15s; margin-top:14px;
  }
  .g-start:hover,.g-result button:hover{transform:translateY(-2px);}
  .g-result .big{font-family:"Heebo",sans-serif; font-weight:800; font-size:48px; color:var(--accent);}
  .g-best{font-family:"Heebo",sans-serif; font-size:14px; color:var(--gold); font-weight:700; margin-top:8px;}
  .tts-note{
    max-width:560px; margin:14px auto 0; font-size:14px; color:var(--muted);
    background:var(--card); border:1px dashed var(--line); border-radius:10px; padding:10px 16px; text-align:center;
  }

  .week-nav{
    display:inline-flex; align-items:center; gap:6px;
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:999;
    padding:5px 10px; background:rgba(255,253,248,.96); border:1px solid var(--line);
    border-radius:999px; box-shadow:0 4px 16px rgba(80,60,30,.15); backdrop-filter:blur(8px);
  }
  .week-nav a{
    font-family:"Heebo",sans-serif; font-weight:700; font-size:12px;
    padding:5px 11px; border-radius:999px; text-decoration:none; transition:.15s; white-space:nowrap;
  }
  .nav-home{background:var(--ok-soft); color:#1f4d43; border:1px solid #bcd9d0;}
  .nav-next{background:var(--accent); color:#fff;}
  .wrap>*{animation:rise .5s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1;}}
</style>
</head>
<body data-page="listening">
<div class="wrap">

<header class="masthead">
  <div class="kicker">🎧 הבנת הנשמע · <span class="jp" dir="ltr">聴解</span></div>
  <h1>תרגול האזנה</h1>
  <p class="sub">שמע את המילה ובחר את התשובה הנכונה — האוזן היא שריר, וזה חדר הכושר שלה</p>
</header>

<div class="controls">
  <select class="week-sel" id="week-sel"></select>
  <div class="seg" id="seg-mode">
    <button data-v="he" class="on">שמע ← משמעות</button>
    <button data-v="jp">שמע ← כתיב</button>
  </div>
</div>

<div class="game-box" id="game-box"></div>
<p class="tts-note">💡 המילים מושמעות בקול הדפדפן. לאיכות הכי טובה מומלץ Chrome עם קול יפני מותקן — בדרך כלל מגיע מובנה.</p>

</div>

<div class="week-nav">
  <a href="index.html" class="nav-home">&#127968; דף הבית</a>
  <a href="flashcards.html" class="nav-next">כרטיסיות ←</a>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  'use strict';
  const N5 = window.N5, DECKS = window.N5_DECKS || {};
  const $ = s => document.querySelector(s);
  const gbox = $('#game-box');

  const G = { week: 'all', mode: 'he', pool: [], q: 0, total: 15, score: 0, streak: 0, playing: false };
  const bestKey = () => G.week + '-' + G.mode;

  /* ---- בורר שבועות ---- */
  const sel = $('#week-sel');
  (function fillWeeks(){
    const all = document.createElement('option');
    all.value = 'all'; all.textContent = 'כל השבועות';
    sel.appendChild(all);
    Object.keys(DECKS).map(Number).sort((a,b)=>a-b).forEach(w => {
      if (!DECKS[w].vocab.length) return;
      const o = document.createElement('option');
      o.value = w; o.textContent = 'שבוע ' + w + ' — ' + DECKS[w].title;
      sel.appendChild(o);
    });
  })();
  sel.addEventListener('change', () => { G.week = sel.value; renderStart(); });
  document.querySelectorAll('#seg-mode button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#seg-mode button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      G.mode = b.dataset.v;
      renderStart();
    });
  });

  function buildPool(){
    const weeks = G.week === 'all' ? Object.keys(DECKS) : [G.week];
    G.pool = [];
    const seen = {};
    weeks.forEach(w => {
      const d = DECKS[w]; if (!d) return;
      d.vocab.forEach(c => {
        if (!c[0] || !c[2] || seen[c[0]]) return;
        seen[c[0]] = 1;
        G.pool.push(c); // [יפנית, קריאה, עברית]
      });
    });
  }
  const speakWord = c => N5.speak(c[1] || c[0]);

  function renderStart(){
    G.playing = false;
    buildPool();
    const best = N5.store.get('listenBest', {})[bestKey()];
    const n = Math.min(G.total, G.pool.length);
    gbox.innerHTML =
      '<p style="font-family:Heebo;font-weight:700;font-size:17px;margin:0">' + n + ' שאלות · ' +
      (G.mode === 'he' ? 'שמע את המילה ובחר את המשמעות' : 'שמע את המילה ובחר את הכתיב הנכון') + '</p>' +
      (best != null ? '<div class="g-best">🏆 השיא שלך: ' + best + ' / ' + G.total + '</div>' : '') +
      '<button class="g-start">התחל תרגול ▶</button>';
    gbox.querySelector('.g-start').addEventListener('click', startGame);
  }
  function startGame(){
    if (G.pool.length < 4) { N5.toast('אין מספיק מילים בשבוע הזה'); return; }
    G.q = 0; G.score = 0; G.streak = 0; G.playing = true;
    nextQ();
  }
  function shuffle(a){ for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i],a[j]] = [a[j],a[i]]; } return a; }

  function nextQ(){
    if (G.q >= Math.min(G.total, G.pool.length)) return endGame();
    const total = Math.min(G.total, G.pool.length);
    const answer = G.pool[Math.floor(Math.random() * G.pool.length)];
    const field = G.mode === 'he' ? 2 : 0;      // מה מציגים בכפתורים
    const wrongs = [];
    const used = {}; used[answer[field]] = 1; used[answer[2]] = 1;
    let guard = 0;
    while (wrongs.length < 3 && guard++ < 400) {
      const c = G.pool[Math.floor(Math.random() * G.pool.length)];
      if (used[c[field]] || used[c[2]]) continue;  // בלי כפילויות ובלי מילים נרדפות
      used[c[field]] = 1; used[c[2]] = 1;
      wrongs.push(c);
    }
    if (wrongs.length < 3) return endGame();
    const opts = shuffle([answer].concat(wrongs));

    gbox.innerHTML =
      '<div class="g-meta"><span>שאלה ' + (G.q + 1) + ' / ' + total + '</span><span>ניקוד: ' + G.score + '</span></div>' +
      '<div class="g-bar"><span style="width:' + (G.q / total * 100) + '%"></span></div>' +
      '<button class="g-play" title="השמע שוב">🔊</button>' +
      '<div class="g-play-lbl">לחץ להשמעה חוזרת</div>' +
      '<div class="g-opts">' + opts.map((o, i) =>
        '<button class="' + (G.mode === 'jp' ? 'jp-opt' : '') + '" data-i="' + i + '">' + o[field] + '</button>'
      ).join('') + '</div>' +
      '<div class="g-streak"></div>';

    const playBtn = gbox.querySelector('.g-play');
    function play(){
      speakWord(answer);
      playBtn.classList.add('playing');
      setTimeout(() => playBtn.classList.remove('playing'), 1200);
    }
    playBtn.addEventListener('click', play);
    setTimeout(play, 350);   // הצליל הוא השאלה — מושמע אוטומטית

    const streakEl = gbox.querySelector('.g-streak');
    gbox.querySelectorAll('.g-opts button').forEach(b => {
      b.addEventListener('click', () => {
        if (!G.playing) return;
        gbox.querySelectorAll('.g-opts button').forEach(x => x.disabled = true);
        const right = opts[+b.dataset.i] === answer;
        if (right) {
          b.classList.add('correct');
          G.score++; G.streak++;
          if (window.N5G) N5G.addXP(2, b);
          if (G.streak >= 3) streakEl.textContent = '🔥 רצף של ' + G.streak + '!';
        } else {
          b.classList.add('wrong');
          G.streak = 0;
          gbox.querySelectorAll('.g-opts button').forEach(x => {
            if (opts[+x.dataset.i] === answer) x.classList.add('correct');
          });
          streakEl.innerHTML = 'המילה: <span class="jp">' + answer[0] + '</span>' +
            (answer[1] && answer[1] !== answer[0] ? ' <span class="jp">(' + answer[1] + ')</span>' : '') + ' — ' + answer[2];
        }
        setTimeout(() => { G.q++; nextQ(); }, right ? 750 : 2100);
      });
    });
  }

  function endGame(){
    G.playing = false;
    const total = Math.min(G.total, G.pool.length);
    const bests = N5.store.get('listenBest', {});
    const prev = bests[bestKey()];
    const isRecord = prev == null || G.score > prev;
    if (isRecord) { bests[bestKey()] = G.score; N5.store.set('listenBest', bests); }
    const pct = G.score / total;
    if (window.N5G) N5G.addXP(pct >= 0.8 ? 12 : pct >= 0.6 ? 6 : 3, gbox);
    if (G.score === total || (isRecord && prev != null)) N5.confetti(45);
    gbox.innerHTML =
      '<div class="g-result">' +
        '<div class="big">' + G.score + ' / ' + total + '</div>' +
        (isRecord ? '<div class="g-best">🏆 שיא אישי חדש!</div>' : (prev != null ? '<div class="g-best">השיא שלך: ' + prev + '</div>' : '')) +
        '<p style="font-family:Heebo;margin:8px 0 0">' + (pct === 1 ? 'אוזן מושלמת! 完璧！' : pct >= 0.7 ? 'שמיעה מצוינת! עוד קצת ותגיע לשלמות.' : 'האוזן מתחזקת עם כל סיבוב — עוד אחד?') + '</p>' +
        '<button>עוד סיבוב 🔁</button>' +
      '</div>';
    gbox.querySelector('button').addEventListener('click', startGame);
  }

  renderStart();
});
</script>
</body>
</html>
